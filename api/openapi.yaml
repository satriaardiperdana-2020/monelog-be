openapi: 3.0.3
info:
  title: Monelog API
  version: 1.0.0
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Transaction:
      type: object
      properties:
        id: { type: integer, format: int64 }
        user_id: { type: integer, format: int64 }
        category_id: { type: integer, format: int64 }
        amount: { type: integer, format: int64 }
        note: { type: string }
        date: { type: string, format: date }
        created_at: { type: string, format: date-time }
      required: [id, user_id, category_id, amount, date]
    CreateTransactionRequest:
      type: object
      properties:
        category_id: { type: integer, format: int64 }
        amount: { type: integer, format: int64 }
        date: { type: string, format: date }
        note: { type: string }
      required: [category_id, amount, date]
security:
  - BearerAuth: []
paths:
  /transactions:
    post:
      operationId: createTransaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransactionRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
    get:
      operationId: getTransactions
      parameters:
        - name: from
          in: query
          required: true
          schema: { type: string, format: date }
        - name: to
          in: query
          required: true
          schema: { type: string, format: date }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Transaction'