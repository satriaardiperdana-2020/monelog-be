openapi: 3.0.3
info:
  title: monelog App API
  version: 1.0.0
  description: API untuk aplikasi catatan keuangan.

# 1. Definisikan Skema Keamanan JWT
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    # 2. Definisikan model data
    Transaction:
      type: object
      properties:
        id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        category_id:
          type: integer
          format: int64
        amount:
          type: integer
          format: int64
          description: Nominal dalam satuan rupiah
        note:
          type: string
        date:
          type: string
          format: date
        created_at:
          type: string
          format: date-time
      required: [id, user_id, category_id, amount, date]
    CreateTransactionRequest:
      type: object
      properties:
        category_id:
          type: integer
          format: int64
        amount:
          type: integer
          format: int64
        date:
          type: string
          format: date
        note:
          type: string
      required: [category_id, amount, date]

# 3. Definisikan endpoint-endpoint API
security:
  - BearerAuth: [] # Terapkan autentikasi ke semua endpoint secara default

paths:
  /transactions:
    post:
      operationId: createTransaction
      summary: Membuat transaksi baru
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransactionRequest'
      responses:
        '201':
          description: Transaksi berhasil dibuat
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '400':
          description: Request tidak valid
    get:
      operationId: getTransactions
      summary: Mendapatkan daftar transaksi berdasarkan rentang tanggal
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Daftar transaksi berhasil diambil
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Transaction'