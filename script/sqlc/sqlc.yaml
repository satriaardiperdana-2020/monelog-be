version: "2"
sql:
  - engine: "postgresql"
    queries: "/queries/queries.sql"
    schema: "/schema/001_create_tables.sql"
    gen:
      go:
        package: "postgresql"
        out: "../../internal/repository/postgresql"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        overrides:
          - db_type: "timestamptz"
            go_type: "time.Time"
            nullable: false