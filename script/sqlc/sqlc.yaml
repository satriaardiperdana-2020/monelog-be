version: "2"
sql:
  - engine: "postgresql"
    queries: "sql/queries/queries.sql"
    schema: "sql/schema/001_create_tables.sql"
    gen:
      go:
        package: "db"
        out: "../internal/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true